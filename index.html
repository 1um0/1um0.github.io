<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屋智能3D控制界面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #three-canvas {
            width: 100%;
            height: 100%;
        }
        
        #device-icons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .device-overlay {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .device-overlay:hover {
            transform: scale(1.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .device-overlay.running {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(234, 179, 8, 0);
            }
        }
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(180deg, 
                rgba(15, 23, 42, 0.8) 0%, 
                transparent 30%,
                transparent 70%,
                rgba(15, 23, 42, 0.9) 100%);
        }
        
        .ui-element {
            pointer-events: auto;
        }
        
        .device-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            padding: 24px;
            min-width: 320px;
            max-width: 400px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .device-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .control-btn {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .control-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }
        
        .control-btn.active {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
            color: #93c5fd;
        }
        
        .room-info {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="three-canvas"></canvas>
        <div id="device-icons"></div>
    </div>
    
    <div id="ui-overlay">
        <div class="ui-element absolute top-0 left-0 right-0 p-4 flex justify-between items-center">
            <div class="text-white text-lg font-semibold">
                <span class="text-blue-400">全屋智能</span> · 3D视图
            </div>
            <div class="flex gap-2">
                <button onclick="resetView()" class="control-btn ui-element">重置视角</button>
                <button onclick="toggleAutoRotate()" class="control-btn ui-element" id="rotate-btn">停止旋转</button>
            </div>
        </div>
        
        <div class="ui-element absolute left-4 top-1/2 -translate-y-1/2">
            <div class="room-info mb-3">
                <div class="text-xs text-gray-400 mb-1">当前房间</div>
                <div class="text-lg font-medium" id="current-room">全屋概览</div>
            </div>
            <div class="room-info">
                <div class="text-xs text-gray-400 mb-1">在线设备</div>
                <div class="text-lg font-medium text-blue-400" id="device-count">7台</div>
            </div>
        </div>
        
        <div class="ui-element absolute bottom-4 left-1/2 -translate-x-1/2">
            <div class="text-gray-400 text-sm text-center">
                <span class="mr-4">🖱️ 拖拽旋转</span>
                <span class="mr-4">🔄 滚轮缩放</span>
                <span>👆 点击设备控制</span>
            </div>
        </div>
        
        <div class="ui-element absolute right-4 bottom-4">
            <div class="bg-slate-900/80 backdrop-blur-sm rounded-lg p-3 border border-slate-700">
                <div class="text-xs text-gray-400 mb-2">设备状态</div>
                <div class="flex items-center gap-2 text-sm text-gray-300 mb-1">
                    <div class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></div>
                    <span>运行中</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-300">
                    <div class="w-3 h-3 rounded-full bg-gray-500"></div>
                    <span>待机</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="device-panel" class="device-panel ui-element">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h3 class="text-xl font-semibold text-white" id="panel-title">设备名称</h3>
                <p class="text-sm text-gray-400" id="panel-status">待机状态</p>
            </div>
            <button onclick="closeDevicePanel()" class="text-gray-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <span class="text-gray-300">电源开关</span>
                <button id="power-btn" onclick="toggleDevicePower()" class="control-btn">开启</button>
            </div>
            
            <div id="temperature-control" class="hidden">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-gray-300">温度设定</span>
                    <span class="text-2xl font-semibold text-blue-400" id="temp-display">24°C</span>
                </div>
                <input type="range" min="16" max="30" value="24" 
                    class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer"
                    id="temp-slider" onchange="updateTemperature(this.value)">
                <div class="flex justify-between text-xs text-gray-500 mt-1">
                    <span>16°C</span>
                    <span>30°C</span>
                </div>
            </div>
            
            <div id="brightness-control" class="hidden">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-gray-300">亮度调节</span>
                    <span class="text-2xl font-semibold text-yellow-400" id="brightness-display">80%</span>
                </div>
                <input type="range" min="0" max="100" value="80" 
                    class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer"
                    id="brightness-slider" onchange="updateBrightness(this.value)">
            </div>
            
            <div>
                <span class="text-gray-300 text-sm block mb-2">场景模式</span>
                <div class="flex flex-wrap gap-2" id="scene-modes">
                    <button class="control-btn text-xs">阅读模式</button>
                    <button class="control-btn text-xs">观影模式</button>
                    <button class="control-btn text-xs">睡眠模式</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, room;
        let isRotating = true;
        let deviceIcons = [];
        let iconElements = {};
        let currentDeviceId = null;
        let devicesData = {};
        
        window.onload = function() {
            try {
                init();
                console.log('3D场景初始化成功');
            } catch (error) {
                console.error('初始化失败:', error);
                document.body.innerHTML = '<div style="color:white;padding:50px;text-align:center;">场景加载失败，请检查网络连接后刷新页面重试<br><br>错误信息: ' + error.message + '</div>';
            }
        };
        
        function init() {
            if (typeof THREE === 'undefined') {
                throw new Error('Three.js库未加载');
            }
            
            const canvas = document.getElementById('three-canvas');
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 20, 20);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(15, 30, 15);
            scene.add(directionalLight);
            
            createRealisticHouseModel();
            createDeviceIconElements();
            setupMouseInteractions();
            window.addEventListener('resize', onWindowResize);
            
            animate();
        }
        
        function createRealisticHouseModel() {
            room = new THREE.Group();
            
            const wallThickness = 0.3;
            const outerWallHeight = 3.5;
            const floorHeight = 0.05;
            
            const floorMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x1e293b,
                side: THREE.DoubleSide
            });
            
            const wallMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xf8fafc,
                transparent: true,
                opacity: 0.85,
                side: THREE.DoubleSide
            });
            
            const wallMaterialDark = new THREE.MeshPhongMaterial({ 
                color: 0xe2e8f0,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide
            });
            
            const rooms = [
                { name: '客厅', x: 2, z: -1.5, width: 6, depth: 5 },
                { name: '主卧', x: -4, z: -1.5, width: 4, depth: 5 },
                { name: '厨房', x: 2, z: 3.5, width: 4, depth: 3 },
                { name: '浴室', x: -4.5, z: 3.5, width: 3, depth: 3 },
                { name: '次卧', x: 5, z: 3, width: 4, depth: 4 }
            ];
            
            rooms.forEach(roomData => {
                const floorGeometry = new THREE.BoxGeometry(
                    roomData.width - wallThickness, 
                    floorHeight, 
                    roomData.depth - wallThickness
                );
                const floor = new THREE.Mesh(floorGeometry, floorMaterial);
                floor.position.set(roomData.x, -floorHeight / 2, roomData.z);
                room.add(floor);
                
                createRoomLabel(roomData.name, roomData.x, 0.1, roomData.z);
            });
            
            const houseWidth = 14;
            const houseDepth = 9;
            
            createWall(houseWidth, outerWallHeight, wallThickness, 0, outerWallHeight / 2, -houseDepth / 2, 0, wallMaterial);
            createWall(houseWidth, outerWallHeight, wallThickness, 0, outerWallHeight / 2, houseDepth / 2, 0, wallMaterial);
            createWall(houseDepth, outerWallHeight, wallThickness, -houseWidth / 2, outerWallHeight / 2, 0, Math.PI / 2, wallMaterial);
            createWall(houseDepth, outerWallHeight, wallThickness, houseWidth / 2, outerWallHeight / 2, 0, Math.PI / 2, wallMaterial);
            
            createWall(5, outerWallHeight, wallThickness, -1, outerWallHeight / 2, -1.5, Math.PI / 2, wallMaterialDark);
            createWall(3, outerWallHeight, wallThickness, 4, outerWallHeight / 2, 1, Math.PI / 2, wallMaterialDark);
            createWall(3, outerWallHeight, wallThickness, -1, outerWallHeight / 2, 4.5, Math.PI / 2, wallMaterialDark);
            createWall(4, outerWallHeight, wallThickness, -5.5, outerWallHeight / 2, 2.5, 0, wallMaterialDark);
            createWall(3, outerWallHeight, wallThickness, 3.5, outerWallHeight / 2, 2.5, 0, wallMaterialDark);
            
            createFurnitureModels();
            scene.add(room);
        }
        
        function createWall(width, height, depth, x, y, z, rotationY, material) {
            const wallGeometry = new THREE.BoxGeometry(width, height, depth);
            const wall = new THREE.Mesh(wallGeometry, material);
            wall.position.set(x, y, z);
            wall.rotation.y = rotationY;
            room.add(wall);
        }
        
        function createFurnitureModels() {
            const furnitureMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x475569,
                transparent: true,
                opacity: 0.7
            });
            
            const sofa = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.6, 0.8), furnitureMaterial);
            sofa.position.set(2, 0.3, -3);
            room.add(sofa);
            
            const table = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 0.6), furnitureMaterial);
            table.position.set(2, 0.2, -2);
            room.add(table);
            
            const bed = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 2.2), furnitureMaterial);
            bed.position.set(-4, 0.25, -1.5);
            room.add(bed);
            
            const cabinet = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.9, 0.5), furnitureMaterial);
            cabinet.position.set(2, 0.45, 4.5);
            room.add(cabinet);
        }
        
        function createRoomLabel(text, x, y, z) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
            
            context.fillStyle = 'rgba(255, 255, 255, 0.95)';
            context.font = 'bold 32px Arial';
            context.textAlign = 'center';
            context.fillText(text, 128, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ 
                map: texture,
                transparent: true,
                opacity: 0.9
            });
            const sprite = new THREE.Sprite(material);
            
            sprite.position.set(x, y + 0.1, z);
            sprite.scale.set(3, 1.5, 1);
            room.add(sprite);
        }
        
        function createDeviceIconElements() {
            const container = document.getElementById('device-icons');
            container.innerHTML = '';
            iconElements = {};
            deviceIcons = [];
            
            const devices = [
                {
                    id: 'light',
                    name: '客厅主灯',
                    x: 2, y: 3.0, z: -2,
                    color: 'rgba(234, 179, 8, 0.25)',
                    iconColor: 'text-yellow-500',
                    icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>',
                    type: 'light',
                    running: true
                },
                {
                    id: 'ac',
                    name: '客厅空调',
                    x: 0, y: 2.8, z: -4,
                    color: 'rgba(59, 130, 246, 0.25)',
                    iconColor: 'text-blue-500',
                    icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>',
                    type: 'ac',
                    running: false
                },
                {
                    id: 'tv',
                    name: '客厅电视',
                    x: 2, y: 1.5, z: -4,
                    color: 'rgba(75, 85, 99, 0.25)',
                    iconColor: 'text-gray-500',
                    icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>',
                    type: 'tv',
                    running: false
                },
                {
                    id: 'robot',
                    name: '扫地机器人',
                    x: 3, y: 0.2, z: -1,
                    color: 'rgba(16, 185, 129, 0.25)',
                    iconColor: 'text-green-500',
                    icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>',
                    type: 'robot',
                    running: false
                },
                {
                    id: 'bedroom-light',
                    name: '主卧灯',
                    x: -4, y: 3.0, z: -1.5,
                    color: 'rgba(234, 179, 8, 0.25)',
                    iconColor: 'text-yellow-500',
                    icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>',
                    type: 'light',
                    running: false
                },
                {
                    id: 'kitchen-light',
                    name: '厨房灯',
                    x: 2, y: 3.0, z: 3.5,
                    color: 'rgba(234, 179, 8, 0.25)',
                    iconColor: 'text-yellow-500',
                    icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>',
                    type: 'light',
                    running: false
                },
                {
                    id: 'bathroom-ac',
                    name: '浴室空调',
                    x: -4.5, y: 2.8, z: 3.5,
                    color: 'rgba(59, 130, 246, 0.25)',
                    iconColor: 'text-blue-500',
                    icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>',
                    type: 'ac',
                    running: false
                }
            ];
            
            devices.forEach(device => {
                deviceIcons.push({
                    id: device.id,
                    position: new THREE.Vector3(device.x, device.y, device.z)
                });
                
                devicesData[device.id] = device;
                
                const iconDiv = document.createElement('div');
                iconDiv.className = `device-overlay ${device.running ? 'running' : ''} pointer-events-auto`;
                iconDiv.style.background = device.color;
                iconDiv.style.width = '48px';
                iconDiv.style.height = '48px';
                iconDiv.style.borderRadius = '12px';
                iconDiv.style.display = 'flex';
                iconDiv.style.alignItems = 'center';
                iconDiv.style.justifyContent = 'center';
                iconDiv.onclick = () => openDevicePanel(device.id);
                
                iconDiv.innerHTML = `<svg class="w-8 h-8 ${device.iconColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24">${device.icon}</svg>`;
                
                container.appendChild(iconDiv);
                iconElements[device.id] = iconDiv;
            });
        }
        
        function updateDeviceIconsPosition() {
            const canvas = document.getElementById('three-canvas');
            
            deviceIcons.forEach(device => {
                const iconElement = iconElements[device.id];
                if (!iconElement) return;
                
                const worldPosition = device.position.clone();
                worldPosition.applyMatrix4(room.matrixWorld);
                
                const screenPosition = worldPosition.clone();
                screenPosition.project(camera);
                
                const x = (screenPosition.x * 0.5 + 0.5) * canvas.clientWidth;
                const y = (screenPosition.y * -0.5 + 0.5) * canvas.clientHeight;
                
                const isInFront = screenPosition.z < 1;
                
                if (isInFront) {
                    const distance = camera.position.distanceTo(worldPosition);
                    const scale = Math.max(0.5, Math.min(1.2, 15 / distance));
                    const opacity = Math.max(0.3, Math.min(1, 20 / distance));
                    
                    iconElement.style.left = `${x - 24}px`;
                    iconElement.style.top = `${y - 24}px`;
                    iconElement.style.transform = `scale(${scale})`;
                    iconElement.style.opacity = opacity;
                    iconElement.style.display = 'flex';
                    iconElement.style.pointerEvents = 'auto';
                } else {
                    iconElement.style.display = 'none';
                    iconElement.style.pointerEvents = 'none';
                }
            });
        }
        
        function setupMouseInteractions() {
            const canvas = document.getElementById('three-canvas');
            
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            let isMouseDown = false;
            
            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                isMouseDown = true;
                isRotating = false;
            });
            
            canvas.addEventListener('mouseup', () => {
                isDragging = false;
                isMouseDown = false;
            });
            
            canvas.addEventListener('mouseleave', () => {
                isMouseDown = false;
                isDragging = false;
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (isDragging && isMouseDown) {
                    const deltaMove = {
                        x: e.offsetX - previousMousePosition.x,
                        y: e.offsetY - previousMousePosition.y
                    };
                    
                    room.rotation.y += deltaMove.x * 0.008;
                    room.rotation.x += deltaMove.y * 0.004;
                    room.rotation.x = Math.max(-Math.PI / 4, Math.min(Math.PI / 4, room.rotation.x));
                }
                
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            });
            
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                camera.position.z += e.deltaY * 0.02;
                camera.position.z = Math.max(12, Math.min(40, camera.position.z));
                camera.position.y = camera.position.z * 0.8;
            });
        }
        
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (isRotating) {
                room.rotation.y += 0.002;
            }
            
            updateDeviceIconsPosition();
            renderer.render(scene, camera);
        }
        
        function openDevicePanel(deviceId) {
            currentDeviceId = deviceId;
            const device = devicesData[deviceId];
            
            document.getElementById('panel-title').textContent = device.name;
            document.getElementById('panel-status').textContent = device.running ? '运行中' : '待机状态';
            
            const tempControl = document.getElementById('temperature-control');
            const brightnessControl = document.getElementById('brightness-control');
            
            tempControl.classList.add('hidden');
            brightnessControl.classList.add('hidden');
            
            if (device.type === 'ac') {
                tempControl.classList.remove('hidden');
            } else if (device.type === 'light') {
                brightnessControl.classList.remove('hidden');
            }
            
            const powerBtn = document.getElementById('power-btn');
            powerBtn.textContent = device.running ? '关闭' : '开启';
            powerBtn.classList.toggle('active', device.running);
            
            document.getElementById('device-panel').classList.add('active');
        }
        
        function closeDevicePanel() {
            document.getElementById('device-panel').classList.remove('active');
            currentDeviceId = null;
        }
        
        function toggleDevicePower() {
            if (!currentDeviceId) return;
            
            const device = devicesData[currentDeviceId];
            device.running = !device.running;
            
            document.getElementById('panel-status').textContent = device.running ? '运行中' : '待机状态';
            const powerBtn = document.getElementById('power-btn');
            powerBtn.textContent = device.running ? '关闭' : '开启';
            powerBtn.classList.toggle('active', device.running);
            
            const iconElement = iconElements[currentDeviceId];
            if (iconElement) {
                iconElement.classList.toggle('running', device.running);
            }
        }
        
        function updateTemperature(value) {
            document.getElementById('temp-display').textContent = value + '°C';
        }
        
        function updateBrightness(value) {
            document.getElementById('brightness-display').textContent = value + '%';
        }
        
        function resetView() {
            room.rotation.x = 0;
            room.rotation.y = 0;
            camera.position.set(0, 20, 20);
        }
        
        function toggleAutoRotate() {
            isRotating = !isRotating;
            const btn = document.getElementById('rotate-btn');
            btn.textContent = isRotating ? '停止旋转' : '开始旋转';
        }
    </script>
</body>
</html>
