<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山野路迹 · 案例展厅</title>
  <link rel="stylesheet" href="assets/site.css">
</head>
<body>
  <main class="home-shell">
    <header class="home-header">
      <div class="eyebrow">SHANYE LUJI CASE GALLERY</div>
      <h1>山野路迹<br>案例展厅</h1>
      <p class="lead">选择一条路线，查看对应的 3D 路迹小报、路线明信片、公众号长图、小红书九宫格和可旋转 STL 冰箱贴模型。</p>
    </header>

    <section class="route-grid" aria-label="路线案例">
      <a class="route-card" href="routes/muxingu/">
        <figure>
          <img src="routes/muxingu/photos/IMG_0152.jpg" alt="千岛湖牧心谷林道路迹照片">
          <figcaption>淳安 · 千岛湖</figcaption>
        </figure>
        <div class="route-card-body">
          <h2>牧心谷</h2>
          <p class="lead">轻松、狼狈但开心的一次山野记录，包含完整网页和平面文创成果。</p>
          <div class="meta-row">
            <span class="pill">10.58 km</span>
            <span class="pill">海拔跨度 180 m</span>
            <span class="pill">5h06m</span>
            <span class="pill">STL 模型</span>
          </div>
          <span class="enter">进入案例</span>
        </div>
      </a>

      <a class="route-card" href="routes/yandang/">
        <figure>
          <img src="routes/yandang/trail_poster.png" alt="雁荡三尖案例预览">
          <figcaption>雁荡山 · 雁荡三尖</figcaption>
        </figure>
        <div class="route-card-body">
          <h2>雁荡山</h2>
          <p class="lead">硬核、狼狈但开心的雁荡三尖路线，收录 3D 小报、社交图和冰箱贴模型。</p>
          <div class="meta-row">
            <span class="pill">17.41 km</span>
            <span class="pill">海拔跨度 1074 m</span>
            <span class="pill">10h28m</span>
            <span class="pill">STL 模型</span>
          </div>
          <span class="enter">进入案例</span>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
